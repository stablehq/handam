action: unassign_room_drag_to_pool (객실 카드 미배정 풀로 드래그)
description: |
  RoomAssignment 페이지에서 배정된 객실 카드를 미배정 풀 영역으로 드래그.
  PUT /api/reservations/{res_id}/room 엔드포인트, action=drop_on_pool.
  unassign_room 후 reconcile_chips_for_reservation 이 연쇄 실행되어
  SMS 칩 상태를 갱신함.

reference_session: 2026-04-27
created_at: 2026-04-28
confidence: draft
promotion_threshold: 3

preconditions:
  user_action: 객실 카드를 미배정 풀 영역으로 드래그 앤 드롭
  action_tag: drop_on_pool
  has_assignment: true  # 배정 상태인 예약

expected_trace:
  - event: request.enter
    category: MANDATORY
    fields:
      method: PUT
      path: /api/reservations/*/room   # res_id 는 "*"
      action_prefix: drop_on_pool

  - event: unassign_room.enter
    category: MANDATORY
    fields:
      res_id: "*"
      from_date: "*"   # 배정 시작 날짜
      end_date: "*"    # 배정 종료 날짜
      action_prefix: drop_on_pool

  - event: activity_log.created
    category: MANDATORY
    fields:
      type: room_move
      status: success
      created_by: "*"   # manual (사용자 드롭) | system (sync 등) — 둘 다 허용

  - event: compact_bed_orders
    category: CONDITIONAL
    condition: 도미토리 bed_order 압축이 필요한 경우 (cells 제거 후)
    fields:
      cells_count: "*"
      changed: "*"

  - event: unassign_room.compact
    category: CONDITIONAL
    condition: compact_bed_orders 실행 시 함께 기록됨
    fields:
      res_id: "*"
      cells_count: "*"
      changed: "*"

  - event: unassign_room.exit
    category: MANDATORY
    fields:
      res_id: "*"
      deleted: "*"   # 삭제된 RoomAssignment 행 수

  - event: reconcile_chips_for_reservation.enter
    category: MANDATORY
    fields:
      res_id: "*"
      action_prefix: drop_on_pool

  - event: filter.apply.enter
    category: VARIABLE_COUNT
    min: 1
    fields:
      schedule_id: "*"
      target_date: "*"
      only_date_independent: "*"

  - event: filter.applied
    category: VARIABLE_COUNT
    min: 1
    fields:
      filter_type: "*"      # assignment | column_match 등
      conditions_count: "*"

  - event: filter.apply.exit
    category: VARIABLE_COUNT
    min: 1

  - event: reconcile_chips_for_reservation.exit
    category: MANDATORY
    fields:
      res_id: "*"
      expected: "*"
      existing: "*"
      created: "*"

  - event: request.exit
    category: MANDATORY
    fields:
      status: 200
      action_prefix: drop_on_pool

forbidden_events:
  - event: request.error
    reason: 성공 경로 — 에러 없어야 함

notes: |
  - compact_bed_orders / unassign_room.compact 는 도미토리 셀 제거 후 bed_order 재정렬 시만 발생.
    단일 객실(비도미토리) 배정 해제에서도 cells_count=1 changed=1 로 관측됨 (2026-04-27 req=fyyuvtwq).
  - reconcile_chips_for_reservation.exit 의 expected=0 / existing=0 / created=0 은
    배정 해제 후 SMS 칩이 하나도 해당되지 않는 정상 케이스.
