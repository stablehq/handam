action: naver_sync_sub_events (naver_sync phase5 / bed_order_align sub-events)
description: |
  job.sync_naver_reservations cron 의 naver_sync 파이프라인 내부 sub-event 정답지.
  phase5: 예약 추가/날짜 변경 처리 완료 후 기록 (added_count > 0 인 사이클에만 찍힘).
  bed_order_align: 도미토리 bed_order 5일 윈도우 정렬 검증 완료 후 기록.
  두 이벤트 모두 cron 경로 (req=-).

reference_session: 2026-04-27
created_at: 2026-04-28
confidence: confirmed
promotion_threshold: 3

preconditions:
  trigger: job.sync_naver_reservations cron 진행 중 (naver_sync 파이프라인 내)
  req: "-"   # cron 경로

# --- sub-event 1: naver_sync.phase5 ---

expected_trace:
  - event: naver_sync.phase5
    category: MANDATORY
    fields:
      added_count: "*"          # 이 사이클에서 새로 추가된 예약 수
      date_changed_count: "*"   # 날짜 변경된 예약 수
      dates: "*"                # 추가/변경 대상 날짜 배열 (비어있을 수도 있음 — [] 관측됨)
    notes: |
      - added_count=0 인 사이클에는 phase5 이벤트 자체가 기록되지 않을 수 있음.
        (2026-04-27 관측: added_count >= 1 인 케이스에서만 출현)
      - dates 배열은 added 예약의 check_in/check_out 날짜를 포함하며
        added_count=1 이어도 dates=[] 인 케이스 관측됨 (날짜 미산정 경로 존재 가능).

# --- sub-event 2: naver_sync.bed_order_align ---

  - event: naver_sync.bed_order_align
    category: CONDITIONAL
    condition: 도미토리 연박 그룹이 존재하는 테넌트의 사이클에서 실행
    fields:
      groups_scanned: "*"          # 스캔한 stay_group 수
      members_scanned: "*"         # 스캔한 그룹 멤버(예약) 수
      bed_orders_updated: "*"      # 실제로 bed_order 가 수정된 수
      window_max_checkin: "*"      # 스캔 윈도우 상한 날짜 (today+5 내외)
    notes: |
      - bed_orders_updated=0 은 정상 케이스 (bed_order 가 이미 올바른 상태).
      - window_max_checkin 은 today 기준 5일 후 체크인까지를 스캔하는 윈도우 상한.
      - 2026-04-27 22:50 관측: groups_scanned=1, members_scanned=2, bed_orders_updated=0, window_max_checkin=2026-05-02

forbidden_events:
  - event: naver_sync.bed_order_align.error
    reason: 성공 경로 — bed_order_align 중 예외 발생은 별도 정답지로 분기 필요

notes: |
  - phase5 와 bed_order_align 은 같은 naver_sync 파이프라인 내 순차 실행이나
    항상 같은 사이클에 함께 나타나지는 않음 (각자 조건부 실행).
  - phase5 는 추가/변경 예약이 있는 사이클에, bed_order_align 은 도미토리 그룹 존재 시 실행.
