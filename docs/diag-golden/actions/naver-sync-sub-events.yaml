action: naver_sync_sub_events (naver_sync phase5 / bed_order_align sub-events)
description: |
  job.sync_naver_reservations cron 의 naver_sync 파이프라인 내부 sub-event 정답지.
  phase5: 예약 추가/날짜 변경 처리 완료 후 기록 (added_count > 0 인 사이클에만 찍힘).
  bed_order_align: 도미토리 bed_order 5일 윈도우 정렬 검증 완료 후 기록.
  두 이벤트 모두 cron 경로 (req=-).

reference_session: 2026-04-27
created_at: 2026-04-28
confidence: confirmed
promotion_threshold: 3

preconditions:
  trigger: job.sync_naver_reservations cron 진행 중 (naver_sync 파이프라인 내)
  req: "-"   # cron 경로

# --- sub-event 1: naver_sync.phase5 ---

expected_trace:
  - event: naver_sync.phase5
    category: MANDATORY
    fields:
      added_count: "*"          # 이 사이클에서 새로 추가된 예약 수
      date_changed_count: "*"   # 날짜 변경된 예약 수
      dates: "*"                # 추가/변경 대상 날짜 배열 (비어있을 수도 있음 — [] 관측됨)
    notes: |
      - added_count=0 인 사이클에는 phase5 이벤트 자체가 기록되지 않을 수 있음.
        (2026-04-27 관측: added_count >= 1 인 케이스에서만 출현)
      - dates 배열은 added 예약의 check_in/check_out 날짜를 포함하며
        added_count=1 이어도 dates=[] 인 케이스 관측됨 (날짜 미산정 경로 존재 가능).

# --- sub-event 2: naver_sync.bed_order_align ---

  - event: naver_sync.bed_order_align
    category: CONDITIONAL
    condition: 도미토리 연박 그룹이 존재하는 테넌트의 사이클에서 실행
    fields:
      groups_scanned: "*"          # 스캔한 stay_group 수
      members_scanned: "*"         # 스캔한 그룹 멤버(예약) 수
      bed_orders_updated: "*"      # 실제로 bed_order 가 수정된 수
      window_max_checkin: "*"      # 스캔 윈도우 상한 날짜 (today+5 내외)
    notes: |
      - bed_orders_updated=0 은 정상 케이스 (bed_order 가 이미 올바른 상태).
      - window_max_checkin 은 today 기준 5일 후 체크인까지를 스캔하는 윈도우 상한.
      - 2026-04-27 22:50 관측: groups_scanned=1, members_scanned=2, bed_orders_updated=0, window_max_checkin=2026-05-02

# --- sub-event 3: split (다객실 분할) — 2026-06-07 split-group P2 에서 등재 (기존 갭 해소) ---

  - event: naver_sync.split_multi_room
    category: CONDITIONAL
    condition: 일반실 booking_count>1 신규 예약이 들어온 사이클 (드문 이벤트)
    fields:
      naver_booking_id: "*"
      booking_count: "*"
      siblings_created: "*"     # bc - 1
      split_group_id: "*"       # "nsplit-{ext_id}" (P1 부터 기록)
    notes: |
      - 도입 후 일상 사이클에서 siblings_added=0 이 대부분 (2026-05 실측: 0건/일).
      - 이 이벤트가 갑자기 다발하면 split 가드(미매핑/도미토리/재동기화) 회귀 의심.

  - event: naver_sync.split_summary
    category: CONDITIONAL
    condition: split 대상 검토가 1건이라도 있었던 사이클 (verbose)
    fields:
      total_input: "*"
      siblings_added: "*"
      skip_bc1: "*"
      skip_dorm: "*"
      skip_existing: "*"
      skip_unmapped: "*"
    notes: |
      - 불변식: siblings_added > 0 이면 같은 사이클에 split_multi_room 도 존재해야 함.
      - skip_unmapped > 0 지속 시 운영자 매핑 등록 필요 (미분할 bc>1 잔존 → unsplit_multi_bc 경보 대상).

# --- sub-event 4: split_guard (그룹 정합 경보, split-group P2) ---

  - event: split_guard.cancel_orphan
    category: CONDITIONAL
    condition: 분할 primary 취소 + CONFIRMED sibling 잔존 (일 1회 dedup, source=naver_sync|delete|patch|sweep)
    fields:
      primary_id: "*"
      split_group_id: "*"
      sibling_ids: "*"
      sibling_sent_chips: "*"
      source: "*"
    notes: |
      - critical. ActivityLog(type=split_cancel_orphan, status=failed) 동반.
      - 해소(운영자 sibling 취소/삭제)까지 매일 1회 재발화가 의도된 동작.

  - event: split_guard.bc_drift
    category: CONDITIONAL
    condition: 네이버 incoming bc ≠ 그룹 총 row 수 (취소 포함) + primary CONFIRMED (일 1회 dedup)
    fields:
      primary_id: "*"
      split_group_id: "*"
      incoming_bc: "*"
      group_rows: "*"
      source: "*"

  - event: split_guard.unsplit_multi_bc
    category: CONDITIONAL
    condition: 비분할 매핑 일반실의 네이버 bc 1→N 변경 (freeze 로 stored=1 유지 — 일 1회 dedup)
    fields:
      reservation_id: "*"
      naver_booking_id: "*"
      incoming_bc: "*"
      kind: "*"     # 'unsplit_multi'(진짜 미분할) | 'keyless_split_group'(분할됐는데 키만 누락 — backfill ambiguous 잔존, 객실 추가 생성 금지)
      source: "*"

  - event: split_guard.cancel_propagated
    category: CONDITIONAL
    condition: SPLIT_CANCEL_MODE='auto' (2026-06-07 전환) — 비보호 sibling 자동 취소 실행 (그룹당 1회 ledger)
    fields:
      primary_id: "*"
      split_group_id: "*"
      propagated: "*"     # 취소된 sibling ids
      skipped: "*"        # {sibling_id: 보호신호 목록} — 경보 강등분
      failed: "*"         # SAVEPOINT rollback 된 sibling ids
      source: "*"
    notes: |
      - ActivityLog(type=split_cancel_propagated) 가 전파 원장(ledger) — 재전파 차단 키.
      - alert 모드로 롤백 시 이 항목을 forbidden_events 로 되돌릴 것 (step-03 plan §7).
      - 같은 사이클에 split_guard.cancel_orphan(skip/실패 잔존분, dedup=False) 동반 가능.

  - event: naver_sync.split_freeze_rescue
    category: CONDITIONAL
    condition: split_group_id 보유 row 의 RoomBizItemLink 매핑이 해제된 상태에서 sync (P4 OR-강화가 이중계상을 막은 순간)
    fields:
      reservation_id: "*"
      split_group_id: "*"
    notes: |
      - 정상 운영에서 0건이 기대값. 발화 시 운영자가 매핑을 해제한 것 — 8cc7423 류
        이중계상을 P4 가 막고 있다는 신호이므로 매핑 복구 또는 의도 확인 필요.

  - event: split_guard.reactivated_orphan
    category: CONDITIONAL
    condition: 분할 primary 가 CANCELLED→CONFIRMED 전이 + CANCELLED sibling 잔존 (모드 무관, 일 1회 dedup)
    fields:
      primary_id: "*"
      split_group_id: "*"
      cancelled_sibling_ids: "*"
      source: "*"
    notes: |
      - 자동 부활 전파는 금지 (lifecycle 에 칩/배정 복구 이벤트 부재) — 경보만.

forbidden_events:
  - event: naver_sync.bed_order_align.error
    reason: 성공 경로 — bed_order_align 중 예외 발생은 별도 정답지로 분기 필요
  # split_guard.cancel_propagated 는 2026-06-07 auto 전환과 함께 forbidden → CONDITIONAL 승격
  # (alert 모드로 롤백 시 다시 forbidden 으로 내릴 것 — step-03 plan §7)

notes: |
  - phase5 와 bed_order_align 은 같은 naver_sync 파이프라인 내 순차 실행이나
    항상 같은 사이클에 함께 나타나지는 않음 (각자 조건부 실행).
  - phase5 는 추가/변경 예약이 있는 사이클에, bed_order_align 은 도미토리 그룹 존재 시 실행.
