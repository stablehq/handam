name: Discord Push Notification

on:
  push:
    branches: ['*']

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Send Discord Notification
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BRANCH="${GITHUB_REF#refs/heads/}"
          COMMIT_COUNT=$(echo '${{ toJSON(github.event.commits) }}' | jq length)
          AUTHOR="${{ github.event.head_commit.author.name }}"
          TIMESTAMP="${{ github.event.head_commit.timestamp }}"

          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            COLOR=3066993
            BRANCH_EMOJI="🟢"
          else
            COLOR=3447003
            BRANCH_EMOJI="🔵"
          fi

          COMMITS=""
          for row in $(echo '${{ toJSON(github.event.commits) }}' | jq -r '.[:8][] | @base64'); do
            _jq() { echo "$row" | base64 -d | jq -r "$1"; }
            SHA=$(_jq '.id' | cut -c1-7)
            MSG=$(_jq '.message' | head -1 | cut -c1-60)
            URL=$(_jq '.url')
            COMMITS="${COMMITS}[\`${SHA}\`](${URL})  ${MSG}\n"
          done

          if [ "$COMMIT_COUNT" -eq 1 ]; then
            COUNT_TEXT="1 commit"
          else
            COUNT_TEXT="${COMMIT_COUNT} commits"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "author": {
                "name": "${AUTHOR}",
                "icon_url": "https://github.com/${GITHUB_ACTOR}.png"
              },
              "title": "${BRANCH_EMOJI} ${REPO_NAME} · ${BRANCH}",
              "url": "https://github.com/${GITHUB_REPOSITORY}/commits/${BRANCH}",
              "description": "${COMMITS}\n━━━━━━━━━━━━━━━━━━━━",
              "color": ${COLOR},
              "footer": {
                "text": "${COUNT_TEXT} pushed"
              },
              "timestamp": "${TIMESTAMP}"
            }]
          }
          EOF
          )

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"
